name: npm-publish
on:
  push:
    branches:
      - master
      - test

permissions:
  id-token: write
  packages: write
  contents: read

jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm
        run: npm install -g npm@latest
      - name: Publish to npm
        run: npm publish --provenance --access public
      - name: Get published version
        id: get_version
        run: |
          ARGOPM_VERSION=$(npm show . version)
          echo "The published version is: $ARGOPM_VERSION"
          echo "argopm_version=$ARGOPM_VERSION" >> "$GITHUB_OUTPUT"
          # sleep 5 sec to make sure we can install the latest published version from npm in Dockerfile
          sleep 5
      - run: echo "REPOSITORY_NAME=`echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//"`" >> $GITHUB_ENV
        shell: bash
      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: $GITHUB_ACTOR
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push docker image
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/atlanhq/${{ github.event.repository.name }}:latest
            ghcr.io/atlanhq/${{ github.event.repository.name }}:v${{ steps.get_version.outputs.argopm_version }}
          build-args: |
            ACCESS_TOKEN_USR=$GITHUB_ACTOR
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}
            ARGOPM_VERSION=${{ steps.get_version.outputs.argopm_version }}
